name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack (pnpm/action-setup@v4 の Node.js 24 非互換対応)
        run: corepack enable pnpm

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @line-crm/shared --filter @line-crm/line-sdk --filter @line-crm/db build

      - name: Run worker tests
        run: pnpm --filter worker test

      - name: Type check worker
        run: pnpm --filter worker exec tsc --noEmit

      - name: Type check web
        run: pnpm --filter web exec tsc --noEmit
