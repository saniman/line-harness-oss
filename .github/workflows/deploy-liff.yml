name: Deploy LIFF to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/worker/src/client/**'
      - 'apps/worker/vite.config.*'
      - 'packages/**'
      - '.github/workflows/deploy-liff.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack (pnpm/action-setup@v4 の Node.js 24 非互換対応)
        run: corepack enable pnpm

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @line-crm/shared --filter @line-crm/line-sdk --filter @line-crm/db build

      - run: pnpm --filter worker build
        env:
          VITE_LIFF_ID: ${{ vars.VITE_LIFF_ID }}
          VITE_BOT_BASIC_ID: ${{ vars.VITE_BOT_BASIC_ID }}
          VITE_CALENDAR_CONNECTION_ID: ${{ vars.VITE_CALENDAR_CONNECTION_ID }}
          VITE_API_BASE: https://api.walover-co.work

      - name: Deploy to Cloudflare Pages
        working-directory: apps/worker
        run: pnpm exec wrangler pages deploy ./dist/client --project-name=line-harness-liff
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: aa7b3de8b8dc8dd263572893aa4f652e
