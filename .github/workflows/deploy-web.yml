name: Deploy Web to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack (pnpm/action-setup@v4 の Node.js 24 非互換対応)
        run: corepack enable pnpm

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @line-crm/shared build

      - name: Type check
        run: pnpm --filter web exec tsc --noEmit

      - run: pnpm --filter web run build
        env:
          NEXT_PUBLIC_API_URL: https://api.walover-co.work
          NEXT_PUBLIC_API_KEY: ${{ secrets.API_KEY }}

      - name: Deploy to Cloudflare Pages
        working-directory: apps/worker
        run: pnpm exec wrangler pages deploy ../web/out --project-name=line-harness-web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: aa7b3de8b8dc8dd263572893aa4f652e
